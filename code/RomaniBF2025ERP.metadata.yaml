methodology: 'Structured protocol consisting of: (1) introductory tutorial, (2) two practice runs involving calibration and
  control with up to ten flickering targets, (3) final timed challenge. Two main sessions separated by short break and visual
  texture swap (counterbalanced). Calibration: 60 trials focusing on single flashing target (~1 minute), repeated until 80%+
  accuracy. Tasks: Complex Task (5 colored laser beams, game-oriented) and Speller Task (10 color targets, BCI-oriented symbol
  spelling). Optional free-play run for 16 participants. Data collection: raw EEG, performance metrics, in-game metadata,
  and questionnaires (demographic, session questionnaire, GEQ).'
